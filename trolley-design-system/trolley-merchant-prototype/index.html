<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Trolley Merchant Dashboard — UI Kit</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:rgba(12,23,32,.04);font-family:var(--font-sans);color:var(--color-fg-1)}
  *{box-sizing:border-box}
  #root{display:flex;min-height:100vh}
  .app{flex:1;display:flex;flex-direction:column;min-width:0}
  .content{flex:1;background:rgba(12,23,32,.04);overflow:auto}
  button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="PaymentsScreen.jsx"></script>
<script type="text/babel" src="SignupScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>

<script type="text/babel">
const { useState } = React;
const TITLES = { dashboard:'Dashboard', payments:'Payments', recipients:'Recipients', balances:'Balances', invoices:'Invoices', reports:'Reports', tickets:'Tickets', settings:'Settings' };

function App() {
  const [mode, setMode] = useState(() => localStorage.getItem('trolley_mode') || 'app');
  const [nav, setNav] = useState(() => localStorage.getItem('trolley_nav') || 'dashboard');
  const handleNav = id => { setNav(id); localStorage.setItem('trolley_nav', id); };
  const switchMode = m => { setMode(m); localStorage.setItem('trolley_mode', m); };
  const SCREENS = { dashboard: window.DashboardScreen, payments: window.PaymentsScreen, recipients: window.RecipientsScreen, settings: window.SettingsScreen };
  const Screen = SCREENS[nav];

  const Switcher = () => (
    <div style={{position:'fixed',top:12,right:12,zIndex:200,display:'flex',gap:4,padding:4,borderRadius:999,background:'rgba(12,23,32,.08)',backdropFilter:'blur(8px)'}}>
      {[{id:'app',l:'Dashboard'},{id:'signup',l:'Sign-up flow'}].map(m=>
        <button key={m.id} onClick={()=>switchMode(m.id)} style={{fontFamily:'inherit',padding:'6px 12px',fontSize:12,fontWeight:600,border:'none',borderRadius:999,background:mode===m.id?'#fff':'transparent',color:mode===m.id?'#0C1720':'rgba(12,23,32,.6)',cursor:'pointer',boxShadow:mode===m.id?'0 1px 2px rgba(0,0,0,.1)':'none'}}>{m.l}</button>)}
    </div>
  );

  if (mode === 'signup') {
    return (<><Switcher/><SignupScreen/></>);
  }

  return (
    <>
      <Switcher/>
      <Sidebar active={nav} onNav={handleNav}/>
      <div className="app">
        <Header title={TITLES[nav]} breadcrumb="Merchant Dashboard"/>
        <div className="content">
          {Screen ? <Screen/> : <div style={{padding:40,color:'rgba(12,23,32,.5)'}}>Screen placeholder — not yet built. Try Dashboard, Payments, Recipients, or Settings.</div>}
        </div>
      </div>
    </>
  );
}

(function boot(){
  if (!(window.Sidebar && window.Header && window.SignupScreen && window.DashboardScreen && window.PaymentsScreen && window.RecipientsScreen && window.SettingsScreen)) {
    return setTimeout(boot, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
