<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Ita Skoblinski</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1D4ED8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0F172A;--ink-2:#475569;--accent:#1D4ED8;--accent-strong:#1E40AF;--accent-bright:#2563EB}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#FFFFFF;color:var(--ink-2);min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background-image:radial-gradient(ellipse 60% 60% at 50% 0%, rgba(37,99,235,0.06) 0%, transparent 60%)}
  .wrap{max-width:520px;text-align:center}
  .code{font-size:14px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
  h1{font-size:42px;font-weight:700;letter-spacing:-.03em;line-height:1.1;color:var(--ink);margin-bottom:16px}
  p{font-size:17px;line-height:1.7;margin-bottom:32px}
  .btn{display:inline-block;font-size:16px;font-weight:600;color:#fff;background:var(--accent);padding:13px 24px;border-radius:10px;text-decoration:none;transition:background .18s ease}
  .btn:hover{background:var(--accent-strong)}
  .btn:focus-visible{outline:3px solid var(--accent-bright);outline-offset:3px}
  @media(max-width:520px){h1{font-size:32px}}
</style>
</head>
<body>
  <main class="wrap">
    <p class="code">Error 404</p>
    <h1>This page wandered off.</h1>
    <p>The link may be outdated or the page hasn't been built yet. Let's get you back to the work.</p>
    <a href="/" class="btn">Back to portfolio</a>
  </main>
</body>
</html>
